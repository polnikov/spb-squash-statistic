name: Deploy

on:
  workflow_run:
    workflows: ["Build image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (defaults to "latest")'
        required: false
        default: 'latest'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    # Auto-deploy only on a successful build; manual dispatch always runs.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, home-server]
    steps:
      - name: Show context
        run: |
          echo "Trigger: ${{ github.event_name }}"
          echo "Tag: ${{ github.event.inputs.image_tag || 'latest' }}"
          docker --version
          docker compose version

      - name: Pull latest image
        working-directory: /opt/docker/bbr
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
        run: docker compose pull

      - name: Recreate containers
        working-directory: /opt/docker/bbr
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
        run: docker compose up -d --remove-orphans

      - name: Prune dangling images
        run: docker image prune -f

      - name: Health check
        working-directory: /opt/docker/bbr
        run: |
          # Allow up to ~100s: entrypoint may spend up to 30s on migrate before
          # Next starts (see entrypoint.sh timeout), plus app boot time.
          for i in $(seq 1 20); do
            if docker compose exec -T app wget -qO- http://127.0.0.1:3000/api/health; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting for app... ($i/20)"
            sleep 5
          done
          echo "App did not become healthy in time"
          docker compose logs --tail=80 app
          exit 1
