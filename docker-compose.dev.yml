# Local development / full-stack testing (builds the image locally).
#   Dev infra only (postgres + redis):   docker compose -f docker-compose.dev.yml up -d
#   Full stack incl. app/caddy:         docker compose -f docker-compose.dev.yml --profile full up -d --build
# For production delivery see docker-compose.yml (pulls the GHCR image).
services:
  postgres:
    image: postgres:16-alpine
    container_name: bbr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bbr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bbr}
      POSTGRES_DB: ${POSTGRES_DB:-bbr}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bbr} -d ${POSTGRES_DB:-bbr}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: bbr-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbr-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bbr}:${POSTGRES_PASSWORD:-bbr}@postgres:5432/${POSTGRES_DB:-bbr}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"

  caddy:
    profiles: ["full"]
    image: caddy:2-alpine
    container_name: bbr-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - app

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
